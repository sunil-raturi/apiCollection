info:
  name: 200 / Valid certificate - without file upload
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/v1/training-certificates"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: multipart-form
    data:
      - name: Certificate.CertificateName
        type: text
        value: '"Firearms Screening Cert"'
      - name: Certificate.CertificateUserId
        type: text
        value: "{{userId}}"
      - name: Certificate.TrainingDate
        type: text
        value: 2026-06-12T09:00:00.000Z
      - name: Certificate.AirportId
        type: text
        value: ""
      - name: Certificate.RenewalDate
        type: text
        value: ""
      - name: Certificate.DaysUntilRenewal
        type: text
        value: ""
      - name: File
        type: file
        value: []
      - name: ""
        type: text
        value: ""
        disabled: true
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: "if (!req.headerList.has('Authorization')) {\r

        \    req.setHeader('Authorization', 'Bearer ' + bru.getCollectionVar('accessToken'));\r

        }"
    - type: after-response
      code: "test(\"Status code is successful\", function () {\r

        \    expect(res.getStatus()).to.be.oneOf([200,201,204]);\r

        });\r

        \r

        test(\"Response time is less than 3 seconds\", function () {\r

        \    expect(res.getResponseTime()).to.be.below(3000);\r

        });\r

        \r

        test(\"Response has JSON body when applicable\", function () {\r

        \    if(JSON.stringify(res.getBody())){\r

        \        pm.response.to.be.json;\r

        \    }\r

        });"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
