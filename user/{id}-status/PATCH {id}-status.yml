info:
  name: PATCH {id}/status
  type: http
  seq: 1

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/users/:id/status"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "status": "Activate"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
