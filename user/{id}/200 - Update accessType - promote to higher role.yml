info:
  name: 200 / Update accessType - promote to higher role
  type: http
  seq: 3

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/users/:id"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "airportId": "00000000-0000-0000-0000-000000000000",
        "firstName": "string",
        "lastName": "string",
        "email": null,
        "department": "Unknown",
        "position": null,
        "accessType": "Unknown"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
