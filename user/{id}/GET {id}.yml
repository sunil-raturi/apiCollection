info:
  name: GET {id}
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/v1/users/:id"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: id
      value: ec4400b0-8c50-f111-8fcb-000d3af5653d
      type: path
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "const response = res.getBody();\r

        \r

        test(\"Status code is 200\", function () {\r

        \    expect(res.getStatus()).to.equal(200);\r

        });\r

        \r

        test(\"Response time is less than 3 sec\", function () {\r

        \    expect(res.getResponseTime()).to.be.below(3000);\r

        });\r

        \r

        test(\"Success should be true\", function () {\r

        \    expect(response.success).to.eql(true);\r

        });\r

        \r

        test(\"Response contains required fields\", function () {\r

        \r

        \    expect(response).to.have.property(\"success\");\r

        \    expect(response).to.have.property(\"message\");\r

        \    expect(response).to.have.property(\"timestamp\");\r

        \    expect(response).to.have.property(\"data\");\r

        \r

        });\r

        \r

        test(\"User object contains required fields\", function () {\r

        \r

        \    expect(response.data).to.have.property(\"userId\");\r

        \    expect(response.data).to.have.property(\"airportId\");\r

        \    expect(response.data).to.have.property(\"firstName\");\r

        \    expect(response.data).to.have.property(\"lastName\");\r

        \    expect(response.data).to.have.property(\"userName\");\r

        \    expect(response.data).to.have.property(\"email\");\r

        \    expect(response.data).to.have.property(\"department\");\r

        \    expect(response.data).to.have.property(\"accessType\");\r

        \    expect(response.data).to.have.property(\"status\");\r

        \r

        });\r

        \r

        test(\"Validate data types\", function () {\r

        \r

        \    expect(response.data.userId).to.be.a(\"string\");\r

        \    expect(response.data.airportId).to.be.a(\"string\");\r

        \    expect(response.data.firstName).to.be.a(\"string\");\r

        \    expect(response.data.lastName).to.be.a(\"string\");\r

        \    expect(response.data.userName).to.be.a(\"string\");\r

        \    expect(response.data.email).to.be.a(\"string\");\r

        \    expect(response.data.department).to.be.a(\"string\");\r

        \    expect(response.data.accessType).to.be.a(\"string\");\r

        \    expect(response.data.status).to.be.a(\"boolean\");\r

        \r

        });\r

        \r

        test(\"Email format validation\", function () {\r

        \r

        \    const emailRegex = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;\r

        \r

        \    expect(response.data.email).to.match(emailRegex);\r

        \r

        });\r

        \r

        test(\"UserId should be valid UUID\", function () {\r

        \r

        \    const uuidRegex = /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$/;\r

        \r

        \    expect(response.data.userId).to.match(uuidRegex);\r

        \r

        });\r

        \r

        test(\"AirportId should be valid UUID\", function () {\r

        \r

        \    const uuidRegex = /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$/;\r

        \r

        \    expect(response.data.airportId).to.match(uuidRegex);\r

        \r

        });"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
